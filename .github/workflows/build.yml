name: Build Tauri App
# 
# 构建流程说明：
# 1. Install frontend dependencies - 安装 npm 依赖（包括 Rollup）
# 2. Build inject.js - 从模块化源码构建 inject.js
# 3. Build Tauri app - 构建 Tauri 应用
#
# 注意：inject.js 已重构为模块化代码，需要先用 Rollup 打包

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: '构建环境'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - uat
          - prod

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows (x64)
          # Linux 使用 22.04 构建，确保兼容 22.04 及更新版本
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux (x64)
          # - os: ubuntu-22.04
          #   target: aarch64-unknown-linux-gnu
          #   name: Linux (ARM64)

    runs-on: ${{ matrix.platform.os }}
    name: Build ${{ matrix.platform.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install macOS build dependencies
        if: matrix.platform.os == 'macos-latest'
        run: |
          # 安装 create-dmg（DMG 打包工具）
          brew install create-dmg
          echo "✅ create-dmg installed"

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.platform.os, 'ubuntu')
        run: |
          if [[ "${{ matrix.platform.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            # ARM64 交叉编译依赖
            # 关键：在添加 arm64 架构之前，先限制 security.ubuntu.com 只用于 amd64
            # 使用 sed 命令修改 sources.list（更简单可靠）
            sudo sed -i.bak '/security\.ubuntu\.com/s/^deb /deb [arch=amd64] /' /etc/apt/sources.list
            sudo sed -i.bak '/security\.ubuntu\.com/s/^deb-src /deb-src [arch=amd64] /' /etc/apt/sources.list
            # 同样处理 sources.list.d 中的文件
            for file in /etc/apt/sources.list.d/*.list; do
              if [ -f "$file" ]; then
                sudo sed -i.bak '/security\.ubuntu\.com/s/^deb /deb [arch=amd64] /' "$file"
                sudo sed -i.bak '/security\.ubuntu\.com/s/^deb-src /deb-src [arch=amd64] /' "$file"
              fi
            done
            
            # 现在添加 arm64 架构
            sudo dpkg --add-architecture arm64
            # 配置软件源：只从 ports 仓库获取 arm64 包（使用 jammy = Ubuntu 22.04）
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            # 更新软件包列表
            sudo apt-get update
            sudo apt-get install -y \
              gcc-aarch64-linux-gnu \
              g++-aarch64-linux-gnu \
              libwebkit2gtk-4.1-dev:arm64 \
              libappindicator3-dev:arm64 \
              librsvg2-dev:arm64 \
              libssl-dev:arm64 \
              patchelf
            # 设置交叉编译环境变量
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
            echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          else
            # x86_64 依赖
            sudo apt-get update
            sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              patchelf \
              libssl-dev
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build inject.js (from modular source)
        shell: bash
        run: |
          echo "🔨 Building inject.js from modules..."
          npm run build
          echo "✅ inject.js build complete"
          ls -lh src/inject.js 2>/dev/null || dir src/inject.js

      - name: Determine build environment
        id: env
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="prod"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            ENV="uat"
          else
            ENV="test"
          fi
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "🌍 Building for environment: ${ENV}"

      - name: Set environment variables
        shell: bash
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          ENV_FILE=".env.${ENV}"
          echo "🌍 Setting up environment: $ENV (from ${ENV_FILE})"
          
          if [ ! -f "$ENV_FILE" ]; then
            echo "❌ Missing ${ENV_FILE} — add it or adjust workflow." >&2
            exit 1
          fi
          
          # 与本地 build.sh 一致：从仓库中的 .env.<环境> 注入编译期变量
          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "${line// }" ]] && continue
            echo "$line" >> $GITHUB_ENV
          done < "$ENV_FILE"
          
          # 写入 GITHUB_ENV 不会作用于当前 shell，需从文件解析
          DT="$(grep '^TAURI_DEVTOOLS_ENABLED=' "$ENV_FILE" | head -1 | cut -d= -f2- | tr -d '\r' | xargs)"
          if [ "$DT" = "true" ]; then
            echo "TAURI_CARGO_ARGS=--features devtools" >> $GITHUB_ENV
            echo "✅ TAURI_CARGO_ARGS=--features devtools (from TAURI_DEVTOOLS_ENABLED)"
          else
            echo "TAURI_CARGO_ARGS=" >> $GITHUB_ENV
            echo "✅ TAURI_CARGO_ARGS empty (TAURI_DEVTOOLS_ENABLED=${DT:-unset})"
          fi

      - name: Update tauri.conf.json
        shell: bash
        run: |
          # 备份原始配置
          cp src-tauri/tauri.conf.json src-tauri/tauri.conf.json.bak
          
          # 使用 jq 修改配置
          jq --arg name "$TAURI_PRODUCT_NAME" --arg id "$TAURI_BUNDLE_IDENTIFIER" \
            '.productName = $name | .identifier = $id' \
            src-tauri/tauri.conf.json.bak > src-tauri/tauri.conf.json
          
          echo "✅ Updated tauri.conf.json:"
          echo "  - Product Name: $TAURI_PRODUCT_NAME"
          echo "  - Bundle ID: $TAURI_BUNDLE_IDENTIFIER"

      - name: Fix DMG bundle script (macOS)
        if: matrix.platform.os == 'macos-latest'
        shell: bash
        run: |
          # 预先创建 bundle 目录以避免脚本查找问题
          mkdir -p src-tauri/target/${{ matrix.platform.target }}/release/bundle/dmg
          
          # 如果脚本已存在，确保它有执行权限
          if [ -f "src-tauri/target/${{ matrix.platform.target }}/release/bundle/dmg/bundle_dmg.sh" ]; then
            chmod +x src-tauri/target/${{ matrix.platform.target }}/release/bundle/dmg/bundle_dmg.sh
          fi
          
          echo "✅ DMG bundle preparation complete"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 只在打标签时创建 Release
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Backstage68 {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && '🚀 Release build' || '' }}
          releaseDraft: true
          prerelease: ${{ steps.env.outputs.environment != 'prod' }}
          # 由 .env.<环境> 中的 TAURI_DEVTOOLS_ENABLED 决定是否传入 --features devtools
          args: --target ${{ matrix.platform.target }} ${{ env.TAURI_CARGO_ARGS }}

      - name: Restore tauri.conf.json
        if: always()
        shell: bash
        run: |
          if [ -f "src-tauri/tauri.conf.json.bak" ]; then
            mv src-tauri/tauri.conf.json.bak src-tauri/tauri.conf.json
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backstage68-${{ steps.env.outputs.environment }}-${{ matrix.platform.target }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*
            !src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/._*
          retention-days: 7
